services:
  #  featureflagsservice:
  #    image: featureflagsservice
  #    build:
  #      context: .
  #      dockerfile: FeatureFlagsService/Dockerfile
  
  postgres:
    image: postgres:latest
    container_name: feature_flags_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: feature_flags_db
    ports:
      - "5432:5432"
  
  redis:
    image: redis:latest
    container_name: feature_flags_cache
    ports:
      - "6379:6379"
  
  prometheus:
    image: prom/prometheus:latest
    container_name: feature_flags_prometheus
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml"
      - "prometheus_data:/prometheus"
    networks:
      - localprom
    ports:
      - "9090:9090"
  
  grafana:
    image: grafana/grafana:latest
    container_name: feature_flags_grafana
    restart: unless-stopped
    volumes:
      - "grafana_data:/var/lib/grafana"
    ports:
      - "3000:3000"

networks:
  localprom:
    driver: bridge

volumes:
  prometheus_data: { }
  grafana_data: { }