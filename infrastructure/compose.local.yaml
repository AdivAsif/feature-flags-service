services:
  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    container_name: feature_flags_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__FeatureFlagsDatabase=Host=postgres;Database=feature_flags_db;Username=postgres;Password=password
      - ConnectionStrings__FeatureFlagsCache=redis:6379
      - JwtSecretKey=adivadivadivadivadivadivadivadiv
      - JwtIssuer=http://localhost:8080
      - JwtAudience=feature_flags_api
    ports:
      - "5000:8080"
    networks:
      - feature-flags-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - with-api
  
  postgres:
    image: postgres:latest
    container_name: feature_flags_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: feature_flags_db
      POSTGRES_INITDB_ARGS: "--data-checksums"
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    networks:
      - feature-flags-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: [ "postgres", "-c", "max_connections=100", "-c", "synchronous_commit=off", "-c", "full_page_writes=off" ]
  
  redis:
    image: redis:latest
    container_name: feature_flags_cache
    ports:
      - "6379:6379"
    networks:
      - feature-flags-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
  
  prometheus:
    image: prom/prometheus:latest
    container_name: feature_flags_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml"
      - "prometheus_data:/prometheus:tmpfs"
    networks:
      - feature-flags-network
    ports:
      - "9090:9090"
    restart: unless-stopped
  
  renderer:
    image: grafana/grafana-image-renderer:latest
  
  grafana:
    image: grafana/grafana:latest
    container_name: feature_flags_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
    volumes:
      - "grafana_data:/var/lib/grafana"
      - "./grafana/provisioning:/etc/grafana/provisioning"
      - "./grafana/dashboards:/var/lib/grafana/dashboards"
    ports:
      - "3000:3000"
    networks:
      - feature-flags-network
    depends_on:
      - prometheus
  
  k6:
    image: grafana/k6:latest
    container_name: feature_flags_k6
    networks:
      - feature-flags-network
    volumes:
      - "./k6.local.mixed.js:/scripts/k6-load-test.js"
      - "k6_results:/results"
    environment:
      - K6_OUT=json=/results/k6-results.json
      - BASE_URL=http://api:8080
    user: root
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - load-test
    entrypoint: [ "/bin/sh", "-c", "exec k6 run --out json=/results/k6-results.json /scripts/k6-load-test.js" ]
  
  metabase:
    image: metabase/metabase:latest
    container_name: feature_flags_metabase
    networks:
      - feature-flags-network
    ports:
      - "3001:3000"
    profiles:
      - with-data-visualisation
  
  redis-insight:
    image: redis/redisinsight:latest
    container_name: feature_flags_redis_insight
    networks:
      - feature-flags-network
    ports:
      - "5540:5540"
    environment:
      - RI_REDIS_HOST=redis
      - RI_REDIS_PORT=6379
      - RI_REDIS_ALIAS=Feature Flags Cache
    profiles:
      - with-data-visualisation

networks:
  feature-flags-network:
    driver: bridge

volumes:
  prometheus_data: { }
  grafana_data: { }
  k6_results: { }
