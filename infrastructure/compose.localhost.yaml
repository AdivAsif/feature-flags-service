services:
  postgres:
    image: postgres:latest
    container_name: feature_flags_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: feature_flags_db
      POSTGRES_INITDB_ARGS: "--data-checksums"
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: [ "postgres", "-c", "max_connections=100", "-c", "synchronous_commit=off", "-c", "full_page_writes=off" ]
    networks:
      - feature-flags-network
  
  redis:
    image: redis:latest
    container_name: feature_flags_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    networks:
      - feature-flags-network
  
  prometheus:
    image: prom/prometheus:latest
    container_name: feature_flags_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - "./prometheus.localhost.yml:/etc/prometheus/prometheus.yml"
      - "prometheus_data:/prometheus"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - feature-flags-network
  
  renderer:
    image: grafana/grafana-image-renderer:latest
    networks:
      - feature-flags-network
    restart: unless-stopped
  
  grafana:
    image: grafana/grafana:latest
    container_name: feature_flags_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
    volumes:
      - "grafana_data:/var/lib/grafana"
      - "./grafana/provisioning:/etc/grafana/provisioning"
      - "./grafana/dashboards:/var/lib/grafana/dashboards"
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - renderer
    networks:
      - feature-flags-network

networks:
  feature-flags-network:
    driver: bridge

volumes:
  prometheus_data: { }
  grafana_data: { }
