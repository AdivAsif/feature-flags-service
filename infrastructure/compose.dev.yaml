services:
  api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    container_name: feature_flags_api_chaos
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__FeatureFlagsDatabase=Host=postgres;Database=feature_flags_db;Username=postgres;Password=password
      - ConnectionStrings__FeatureFlagsCache=redis:6379
      - JwtSecretKey=${JWT_SECRET_KEY:-adivadivadivadivadivadivadivadiv}
      - JwtIssuer=http://localhost:8080
      - JwtAudience=feature_flags_api
    ports:
      - "5000:8080"
    networks:
      - feature-flags-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - with-api
  
  postgres:
    image: postgres:latest
    container_name: feature_flags_db_chaos
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: feature_flags_db
      POSTGRES_INITDB_ARGS: "--data-checksums"
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    networks:
      - feature-flags-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: [ "postgres", "-c", "max_connections=100", "-c", "synchronous_commit=off", "-c", "full_page_writes=off" ]
  
  redis:
    image: redis:latest
    container_name: feature_flags_cache_chaos
    ports:
      - "6379:6379"
    networks:
      - feature-flags-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
  
  # Chaos Monkey - Randomly stops/starts Redis and Postgres
  chaos-monkey:
    image: alpine:latest
    container_name: chaos_monkey
    networks:
      - feature-flags-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      sh -c "apk add --no-cache docker-cli &&
      echo 'Chaos Monkey Started - Will randomly pause/unpause Redis and Postgres' &&
      while true; do
        SLEEP_TIME=$$((5 + RANDOM % 6));
        echo 'Sleeping for '$$SLEEP_TIME' seconds...';
        sleep $$SLEEP_TIME;
      
        if [ $$((RANDOM % 2)) -eq 0 ]; then
          TARGET='feature_flags_cache_chaos';
          SERVICE_NAME='Redis';
        else
          TARGET='feature_flags_db_chaos';
          SERVICE_NAME='Postgres';
        fi;
      
        ACTION=$$((RANDOM % 3));
      
        if [ $$ACTION -eq 0 ]; then
          echo '[CHAOS] Pausing '$$SERVICE_NAME'...';
          docker pause $$TARGET 2>/dev/null || echo 'Failed to pause '$$SERVICE_NAME;
          sleep $$((10 + RANDOM % 20));
          echo '[CHAOS] Unpausing '$$SERVICE_NAME'...';
          docker unpause $$TARGET 2>/dev/null || echo 'Failed to unpause '$$SERVICE_NAME;
        elif [ $$ACTION -eq 1 ]; then
          echo '[CHAOS] Stopping '$$SERVICE_NAME'...';
          docker stop -t 2 $$TARGET 2>/dev/null || echo 'Failed to stop '$$SERVICE_NAME;
          sleep $$((5 + RANDOM % 10));
          echo '[CHAOS] Starting '$$SERVICE_NAME'...';
          docker start $$TARGET 2>/dev/null || echo 'Failed to start '$$SERVICE_NAME;
        else
          echo '[CHAOS] Restarting '$$SERVICE_NAME'...';
          docker restart -t 2 $$TARGET 2>/dev/null || echo 'Failed to restart '$$SERVICE_NAME;
        fi;
      done"
    profiles:
      - chaos
    restart: unless-stopped
  
  prometheus:
    image: prom/prometheus:latest
    container_name: feature_flags_prometheus_chaos
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml"
      - "prometheus_data:/prometheus:tmpfs"
    networks:
      - feature-flags-network
    ports:
      - "9090:9090"
    restart: unless-stopped
  
  renderer:
    image: grafana/grafana-image-renderer:latest
  
  grafana:
    image: grafana/grafana:latest
    container_name: feature_flags_grafana_chaos
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
    volumes:
      - "grafana_data:/var/lib/grafana"
      - "./grafana/provisioning:/etc/grafana/provisioning"
      - "./grafana/dashboards:/var/lib/grafana/dashboards"
    ports:
      - "3000:3000"
    networks:
      - feature-flags-network
    depends_on:
      - prometheus
  
  k6:
    image: grafana/k6:latest
    container_name: feature_flags_k6_chaos
    networks:
      - feature-flags-network
    volumes:
      - "./k6.local.mixed.js:/scripts/k6-load-test.js"
      - "k6_results:/results"
    environment:
      - K6_OUT=json=/results/k6-results.json
      - BASE_URL=http://api:8080
    user: root
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - load-test
    entrypoint: [ "/bin/sh", "-c", "exec k6 run --out json=/results/k6-results.json /scripts/k6-load-test.js" ]

networks:
  feature-flags-network:
    driver: bridge

volumes:
  prometheus_data: { }
  grafana_data: { }
  k6_results: { }
