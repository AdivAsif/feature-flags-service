global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: [ 'localhost:9090' ]

  - job_name: 'feature-flags-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: [ 'host.docker.internal:5000' ]
        labels:
          service: 'feature-flags-api'
          environment: 'localhost'
